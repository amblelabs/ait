name: Automated Builds

on:
  workflow_dispatch:
  push:
      paths:
        - src/**
        - build.gradle
        - gradle.properties
        - settings.gradle
        - gradle/**
        - gradlew
        - gradlew.bat
        - versioning.gradle
        - .github/workflows/publish-devbuilds.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Restore DataGen cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: src/main/generated
        key: datagen-${{ github.run_id }}
        restore-keys:
          datagen-

    - name: Run DataGen
      run: ./gradlew --configuration-cache runDatagen

    - name: Save DataGen cache
      id: cache-save
      uses: actions/cache/save@v4
      with:
        path: src/main/generated
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
    
    - name: Build
      run: ./gradlew --configuration-cache build
    
    - name: Build for Maven
      env:
        CI_MAVEN_PATH: maven-root
      run: ./gradlew --configuration-cache publishMavenJavaPublicationToCiRepository

    - name: Push folder to mvn-repo branch via GitHub API
      env:
          OWNER: amblelabs
          REPO: maven
          BRANCH: main              # target branch
          SOURCE_FOLDER: maven-root
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${REPO}.git"

          # Partial clone: metadata only, no blob content
          if ! git clone --filter=blob:none --branch "${BRANCH}" --depth 1 "${REPO_URL}" /tmp/mvn-repo-temp; then
            echo "Branch ${BRANCH} does not exist. Creating fresh branch."
            git init /tmp/mvn-repo-temp
            cd /tmp/mvn-repo-temp
            git checkout -b "${BRANCH}"
            cd -
          fi

          # Copy artifacts into the working tree (overwrites existing files at same paths)
          rsync -av --delete "${SOURCE_FOLDER}/" /tmp/mvn-repo-temp/

          cd /tmp/mvn-repo-temp

          # DO NOT use git add --all; that would stage deletions for placeholder files.
          # Instead, add only the files that we have copied/updated.
          # We add the entire directory structure that we know we are publishing.
          # Git will update the index for those paths, and leave all other paths alone.
          git add --verbose --ignore-removal .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Maven artifacts from workflow run ${GITHUB_RUN_ID}"
            # Push only the new commits + blobs (existing blobs already on server)
            git push origin "${BRANCH}"
            echo "✅ Pushed to ${BRANCH}"
          fi

    - name: Publish artifacts
      uses: drtheodor/discord-webhook-upload-action@v0.2
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: george washington
        avatar: 'https://i.imgur.com/uiFqrQh.png'
        
        message_commit: '> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
        message_header: |
          <:new1:1253371736510959636><:new2:1253371805734015006> New `Adventures in Time` dev build `#${{ github.run_number }}`:

        file: |
          build/libs/*.jar
          !build/libs/*-sources.jar
