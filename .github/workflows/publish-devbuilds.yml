name: Automated Builds

on:
  workflow_dispatch:
  push:
      paths:
        - src/**
        - build.gradle
        - gradle.properties
        - settings.gradle
        - gradle/**
        - gradlew
        - gradlew.bat
        - versioning.gradle
        - .github/workflows/publish-devbuilds.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Restore DataGen cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: src/main/generated
        key: datagen-${{ github.run_id }}
        restore-keys:
          datagen-

    - name: Run DataGen
      run: ./gradlew --configuration-cache runDatagen

    - name: Save DataGen cache
      id: cache-save
      uses: actions/cache/save@v4
      with:
        path: src/main/generated
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
    
    - name: Build
      run: ./gradlew --configuration-cache build
    
    - name: Build for Maven
      env:
        CI_MAVEN_PATH: maven-root
      run: ./gradlew --configuration-cache publishMavenJavaPublicationToCiRepository

    - name: Push folder to mvn-repo branch via GitHub API
      env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
          set -euo pipefail
          TARGET_BRANCH="main"
          SOURCE_FOLDER="./maven-root"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/amblelabs/maven.git"

          # Clone metadata only, no checkout
          if ! git clone --filter=blob:none --no-checkout --depth 1 --branch "${TARGET_BRANCH}" "${REPO_URL}" mvn-repo-temp; then
            # Branch doesn't exist – create empty branch
            git init mvn-repo-temp
            cd mvn-repo-temp
            git checkout -b "${TARGET_BRANCH}"
            cd ..
          fi

          cd mvn-repo-temp

          # Populate index with the current tree (no file content)
          git read-tree HEAD 2>/dev/null || true  # Ignore if HEAD is empty (new branch)

          # Copy our artifacts into working directory (overwrites anything there)
          cp -r "${GITHUB_WORKSPACE}/${SOURCE_FOLDER}/"* .

          # Stage only our changes – existing files not touched are preserved
          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Maven artifacts (run ${GITHUB_RUN_ID})"
            git push origin "${TARGET_BRANCH}"
          fi

    - name: Publish artifacts
      uses: drtheodor/discord-webhook-upload-action@v0.2
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: george washington
        avatar: 'https://i.imgur.com/uiFqrQh.png'
        
        message_commit: '> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
        message_header: |
          <:new1:1253371736510959636><:new2:1253371805734015006> New `Adventures in Time` dev build `#${{ github.run_number }}`:

        file: |
          build/libs/*.jar
          !build/libs/*-sources.jar
