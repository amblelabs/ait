name: Automated Builds

on:
  workflow_dispatch:
  push:
      paths:
        - src/**
        - build.gradle
        - gradle.properties
        - settings.gradle
        - gradle/**
        - gradlew
        - gradlew.bat
        - versioning.gradle
        - .github/workflows/publish-devbuilds.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Restore DataGen cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: src/main/generated
        key: datagen-${{ github.run_id }}
        restore-keys:
          datagen-

    - name: Run DataGen
      run: ./gradlew --configuration-cache runDatagen

    - name: Save DataGen cache
      id: cache-save
      uses: actions/cache/save@v4
      with:
        path: src/main/generated
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
    
    - name: Build
      run: ./gradlew --configuration-cache build
    
    - name: Build for Maven
      env:
        CI_MAVEN_PATH: maven-root
      run: ./gradlew --configuration-cache publishMavenJavaPublicationToCiRepository

    - name: Push folder to mvn-repo branch via GitHub API
      env:
          OWNER: amblelabs
          REPO: maven
          BRANCH: main              # target branch
          SOURCE_FOLDER: maven-root
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
          set -euo pipefail
          API_HEADER="Authorization: Bearer ${GH_TOKEN}"
          API_URL="https://api.github.com/repos/${OWNER}/${REPO}"

          # ------------------------------------------------------------
          # 1. Ensure the target branch exists (create empty if needed)
          # ------------------------------------------------------------
          if ! git ls-remote --heads origin "refs/heads/${BRANCH}" | grep -q "${BRANCH}"; then
            echo "Creating empty branch ${BRANCH}"
            EMPTY_TREE=$(curl -s -H "${API_HEADER}" -X POST "${API_URL}/git/trees" -d '{"tree":[]}' | jq -r '.sha')
            COMMIT_SHA=$(curl -s -H "${API_HEADER}" -X POST "${API_URL}/git/commits" \
              -d "{\"message\":\"Initial empty commit for ${BRANCH}\",\"tree\":\"${EMPTY_TREE}\"}" | jq -r '.sha')
            curl -s -H "${API_HEADER}" -X POST "${API_URL}/git/refs" \
              -d "{\"ref\":\"refs/heads/${BRANCH}\",\"sha\":\"${COMMIT_SHA}\"}" > /dev/null
          fi

          # ------------------------------------------------------------
          # 2. Get current commit and tree SHA of the branch
          # ------------------------------------------------------------
          CURRENT_COMMIT=$(curl -s -H "${API_HEADER}" "${API_URL}/git/refs/heads/${BRANCH}" | jq -r '.object.sha')
          CURRENT_TREE=$(curl -s -H "${API_HEADER}" "${API_URL}/git/commits/${CURRENT_COMMIT}" | jq -r '.tree.sha')
          echo "Current commit: ${CURRENT_COMMIT}, tree: ${CURRENT_TREE}"

          # ------------------------------------------------------------
          # 3. Create blobs for each file and collect tree entries
          # ------------------------------------------------------------
          TREE_ENTRIES="[]"
          find "${SOURCE_FOLDER}" -type f | while read -r file; do
            rel_path="${file#$SOURCE_FOLDER/}"
            echo "Processing: ${rel_path}"

            # Create blob with file content
            content_b64=$(base64 -w 0 "${file}")
            # Use a temp file to avoid argument length limit
            content_file=$(mktemp)
            echo -n "$content_b64" > "$content_file"

            blob_payload=$(jq -n --rawfile content "$content_file" '{content: $content, encoding: "base64"}')
            rm -f "$content_file"

            blob_response=$(curl -s -X POST -H "${API_HEADER}" -H "Content-Type: application/json" \
              -d "$blob_payload" "${API_URL}/git/blobs")
            blob_sha=$(echo "$blob_response" | jq -r '.sha')
            if [ "$blob_sha" = "null" ]; then
              echo "❌ Failed to create blob: $(echo "$blob_response" | jq -r '.message')"
              exit 1
            fi
            echo "  → Blob SHA: ${blob_sha}"

            # Append tree entry
            entry=$(jq -n \
              --arg path "$rel_path" \
              --arg mode "100644" \
              --arg type "blob" \
              --arg sha "$blob_sha" \
              '{path: $path, mode: $mode, type: $type, sha: $sha}')
            TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --argjson entry "$entry" '. + [$entry]')
          done

          # ------------------------------------------------------------
          # 4. Create a new tree based on the current tree + our entries
          # ------------------------------------------------------------
          tree_payload=$(jq -n \
            --arg base_tree "$CURRENT_TREE" \
            --argjson tree "$TREE_ENTRIES" \
            '{base_tree: $base_tree, tree: $tree}')
          new_tree_response=$(curl -s -X POST -H "${API_HEADER}" -H "Content-Type: application/json" \
            -d "$tree_payload" "${API_URL}/git/trees")
          NEW_TREE_SHA=$(echo "$new_tree_response" | jq -r '.sha')
          if [ "$NEW_TREE_SHA" = "null" ]; then
            echo "❌ Failed to create tree: $(echo "$new_tree_response" | jq -r '.message')"
            exit 1
          fi
          echo "New tree SHA: ${NEW_TREE_SHA}"

          # ------------------------------------------------------------
          # 5. Create a commit with the new tree
          # ------------------------------------------------------------
          commit_payload=$(jq -n \
            --arg message "Update Maven repository artifacts via workflow" \
            --arg tree "$NEW_TREE_SHA" \
            --arg parent "$CURRENT_COMMIT" \
            '{message: $message, tree: $tree, parents: [$parent]}')
          new_commit_response=$(curl -s -X POST -H "${API_HEADER}" -H "Content-Type: application/json" \
            -d "$commit_payload" "${API_URL}/git/commits")
          NEW_COMMIT_SHA=$(echo "$new_commit_response" | jq -r '.sha')
          if [ "$NEW_COMMIT_SHA" = "null" ]; then
            echo "❌ Failed to create commit: $(echo "$new_commit_response" | jq -r '.message')"
            exit 1
          fi
          echo "New commit SHA: ${NEW_COMMIT_SHA}"

          # ------------------------------------------------------------
          # 6. Update the branch to point to the new commit
          # ------------------------------------------------------------
          update_response=$(curl -s -X PATCH -H "${API_HEADER}" -H "Content-Type: application/json" \
            -d "{\"sha\":\"${NEW_COMMIT_SHA}\"}" "${API_URL}/git/refs/heads/${BRANCH}")
          if echo "$update_response" | jq -e '.object.sha' > /dev/null; then
            echo "✅ Branch ${BRANCH} updated successfully"
          else
            echo "❌ Failed to update branch: $(echo "$update_response" | jq -r '.message')"
            exit 1
          fi

    - name: Publish artifacts
      uses: drtheodor/discord-webhook-upload-action@v0.2
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: george washington
        avatar: 'https://i.imgur.com/uiFqrQh.png'
        
        message_commit: '> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
        message_header: |
          <:new1:1253371736510959636><:new2:1253371805734015006> New `Adventures in Time` dev build `#${{ github.run_number }}`:

        file: |
          build/libs/*.jar
          !build/libs/*-sources.jar
